<!DOCTYPE html>
<html>

<head>
    <title>2473004-Shelma Septiani</title>
    <style>
        .bingkai-utama {
            border: 1px solid #d1d1d1;
            padding: 15px;
            width: 380px;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ffffff;
        }

        .tabel-form {
            width: 100%;
            border-spacing: 0 8px;
        }

        .tabel-form td {
            vertical-align: top;
        }

        .kotak-input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
        }

        .area-teks {
            width: 100%;
            height: 120px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            resize: none;
        }

        .wrapper-hitung {
            text-align: right;
            margin-top: 2px;
        }

        #txt2 {
            width: 65px;
            text-align: right;
            border: 1px solid #ddd;
            background: #fdfdfd;
            padding-right: 3px;
        }
    </style>
</head>

<body>

    <div class="bingkai-utama">
        <table class="tabel-form">
            <tr>
                <td width="75">Judul</td>
                <td width="15">:</td>
                <td><input type="text" class="kotak-input"></td>
            </tr>
            <tr>
                <td>Deskripsi</td>
                <td>:</td>
                <td>
                    <textarea class="area-teks" 
                              onkeyup="call_onKeyPress(this)" 
                              onkeydown="call_onKeyPress(this)"></textarea>
                    
                    <div class="wrapper-hitung">
                        <input type="text" id="txt2" value="0/256" readonly>
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <script>
        function call_onKeyPress(ob) {
            var obval = ob.value;

            if (obval.length > 256) {
                ob.value = obval.substr(0, 256);
                obval = ob.value; 
            }

            document.getElementById("txt2").value = obval.length + "/256";
        }
    </script>

</body>

</html>
