<!DOCTYPE html>
<html>

<head>
    <title>2473004-Shelma Septiani</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
        }
        .container {
            width: 300px;
            border: 2px solid #ccc;
            padding: 10px;
            background: #eee;
        }
        table {
            border-collapse: collapse;
            margin-top: 10px;
        }
        td {
            border: 2px solid black;
            width: 50px;
            height: 40px;
            text-align: center;
            font-size: 20px;
        }
        input {
            margin-bottom: 5px;
        }
        button {
            margin-top: 5px;
        }
    </style>

    <script>
        function hitung(){
            var x = document.getElementById("angka1").value;
            var y = document.getElementById("angka2").value;

            var a = parseInt(x);
            var b = parseInt(y);

            if(isNaN(a) && isNaN(b)){
                alert("angka pertama dan kedua harus angka");
            } else if(isNaN(a)){
                alert("angka pertama bukan angka");
            } else if(isNaN(b)){
                alert("angka kedua harus angka");
            } else {
                document.getElementById("a1").innerHTML = a;
                document.getElementById("b1").innerHTML = b;
                document.getElementById("hasilTambah").innerHTML = a + b;

                document.getElementById("a2").innerHTML = a;
                document.getElementById("b2").innerHTML = b;
                document.getElementById("hasilKurang").innerHTML = a - b;
            }
        }
    </script>
</head>

<body>

<div class="container">
    <label>Angka Pertama :</label>
    <input type="text" id="angka1"><br>

    <label>Angka Kedua&nbsp;&nbsp;&nbsp;:</label>
    <input type="text" id="angka2"><br>

    <button onclick="hitung()">Count</button>

    <table>
        <tr>
            <td id="a1"></td>
            <td>+</td>
            <td id="b1"></td>
            <td>=</td>
            <td id="hasilTambah"></td>
        </tr>
        <tr>
            <td id="a2"></td>
            <td>-</td>
            <td id="b2"></td>
            <td>=</td>
            <td id="hasilKurang"></td>
        </tr>
    </table>
</div>

</body>
</html>
