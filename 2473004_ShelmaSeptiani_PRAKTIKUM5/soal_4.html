<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473004-Shelma Septiani</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f0f0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        nav {
            background-color: #AA0000;
            overflow: hidden;
            width: 600px;
        }

        nav ul {
            list-style: none;
            overflow: hidden;
        }

        nav ul li {
            float: left;
            background: url('img/nav_left.gif') top left no-repeat;
            padding: 14px 20px 14px 28px;
            height: 100px;
        }

        nav ul li a {
            display: block;
            text-decoration: none;
            color: white;
        }

        nav ul li a .num {
            display: block;
            font-size: 28px;
            font-weight: bold;
            color: white;
            line-height: 1;
            margin-bottom: 4px;
        }

        nav ul li a .label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: white;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        nav ul li a:hover .num,
        nav ul li a:hover .label {
            color: #FFD700;
        }
    </style>
</head>

<body>

    <nav>
        <ul>
            <li>
                <a href="#">
                    <span class="num">01</span>
                    <span class="label">About Shop</span>
                </a>
            </li>
            <li>
                <a href="#">
                    <span class="num">02</span>
                    <span class="label">Gallery</span>
                </a>
            </li>
            <li>
                <a href="#">
                    <span class="num">03</span>
                    <span class="label">Free Music</span>
                </a>
            </li>
            <li>
                <a href="#">
                    <span class="num">04</span>
                    <span class="label">Artist</span>
                </a>
            </li>
            <li>
                <a href="#">
                    <span class="num">05</span>
                    <span class="label">Contacts</span>
                </a>
            </li>
        </ul>
    </nav>

</body>

</html>
